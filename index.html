<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 12px;
    background: #f5f5f5;
    color: #222;
  }

  h1 {
    font-size: 24px;
    margin: 0 0 14px 0;
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    position: sticky;
    top: 0;
    background: #f5f5f5;
    padding-bottom: 6px;
    z-index: 10;
  }

  .category-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    font-size: 14px;
  }

  .category-btn.active {
    font-weight: bold;
    background: #e9eefc;
  }

  .products {
    display: grid;
    gap: 12px;
  }

  .card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.card img {
  width: 120px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  background: #eee;
  flex-shrink: 0;
}

.product-info {
  flex: 1;
}

.title {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 4px;
  line-height: 1.3;
}

.price {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 4px;
}

.status {
  font-size: 13px;
  margin-bottom: 4px;
}

.note,
.address {
  font-size: 12px;
  color: #444;
}

  .title {
    font-size: 18px;
    font-weight: bold;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .price {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .status,
  .note,
  .address {
    font-size: 14px;
    line-height: 1.4;
    margin-bottom: 6px;
    color: #333;
    white-space: pre-line;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .actions a {
    flex: 1;
    text-decoration: none;
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 11px 12px;
    cursor: pointer;
    font-size: 14px;
  }

  .btn-link {
    background: #e9eefc;
  }

  .btn-reserve {
    background: #dff5e1;
  }

  .btn-disabled {
    background: #eee;
    cursor: not-allowed;
  }

  @media (min-width: 700px) {
    body {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .card img {
      height: 220px;
    }
  }
</style>
</head>
<body>
  <h1>Каталог</h1>

  <div id="categories" class="categories"></div>
  <div id="products" class="products"></div>

  <script>
    const tg = window.Telegram.WebApp;
    tg.expand();

   const API_BASE = "";

    const categoriesEl = document.getElementById("categories");
    const productsEl = document.getElementById("products");

    let currentCategory = null;

    async function loadCategories() {
      const res = await fetch(`${API_BASE}/categories`);
      const data = await res.json();

      categoriesEl.innerHTML = "";

      data.categories.forEach(category => {
        const btn = document.createElement("button");
        btn.className = "category-btn";
        btn.textContent = category;
        btn.onclick = () => selectCategory(category, btn);
        categoriesEl.appendChild(btn);
      });

      const firstBtn = categoriesEl.querySelector(".category-btn");
      if (data.categories.length > 0 && firstBtn) {
        selectCategory(data.categories[0], firstBtn);
      }
    }

    async function selectCategory(category, btnElement) {
      currentCategory = category;

      document.querySelectorAll(".category-btn").forEach(btn => {
        btn.classList.remove("active");
      });

      btnElement.classList.add("active");
      await loadProducts(category);
    }

    function statusText(status) {
      if (status === "free") return "🟢 В наличии";
      if (status === "reserved") return "🟡 Забронирован";
      if (status === "sold") return "🔴 Куплен";
      return "⚪ Неизвестно";
    }

    async function loadProducts(category) {
      const res = await fetch(`${API_BASE}/products/${encodeURIComponent(category)}`);
      const data = await res.json();

      productsEl.innerHTML = "";

      data.products.forEach(product => {
        const card = document.createElement("div");
        card.className = "card";

        const imgHtml = product.image
          ? `<img src="${product.image}" alt="${product.name}">`
          : product.image_link
          ? `<img src="${product.image_link}" alt="${product.name}">`
          : "";

       const reserveButton =
  product.status === "free"
    ? `<div style="flex:1;"><button class="btn btn-reserve" onclick="reserveProduct(${product.id})">Забронировать</button></div>`
    : `<div style="flex:1;"><button class="btn btn-disabled" disabled>Недоступно</button></div>`;
        const productUrl = product.full_link || product.product_link || "#";

card.innerHTML = `
  ${imgHtml}

  <div class="product-info">

    <div class="title">${product.name || ""}</div>

    <div class="price">
      ${product.price ? product.price + " ₽" : "Цена не указана"}
    </div>

    <div class="status">${statusText(product.status)}</div>

    <div class="note">
      ${product.note ? product.note : ""}
    </div>

    <div class="address">
      ${product.pickup_address ? "ПВЗ: " + product.pickup_address : ""}
    </div>

    <div class="actions">

      <a href="${productUrl}" target="_blank" style="flex:1;">
        <button class="btn btn-link">Открыть</button>
      </a>

      <div style="flex:1;">
        ${
          product.status === "free"
          ? `<button class="btn btn-reserve" onclick="reserveProduct(${product.id})">Бронь</button>`
          : `<button class="btn btn-disabled" disabled>Нет</button>`
        }
      </div>

    </div>

  </div>
`;

        productsEl.appendChild(card);
      });
    }

async function reserveProduct(productId) {
  try {
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;

    const payload = {
      product_id: productId,
      user_id: tgUser?.id ? String(tgUser.id) : "test_user_1",
      username: tgUser?.username ? tgUser.username : "test_username"
    };

    const res = await fetch(`/reserve`, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    const data = await res.json();

    if (!res.ok) {
      alert(data.detail || "Не удалось забронировать");
      return;
    }

    alert(`Товар забронирован до ${data.expires_at}`);
    location.reload();

  } catch (error) {
    console.error(error);
    alert("Ошибка при бронировании");
  }
}

    loadCategories();
  </script>
</body>
</html>
