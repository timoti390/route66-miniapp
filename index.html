<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Каталог</title>
  <script src="https://telegram.org/js/telegram-web-app.js"></script>
  <style>
  * {
    box-sizing: border-box;
  }

  body {
    font-family: Arial, sans-serif;
    margin: 0;
    padding: 12px;
    background: #f5f5f5;
    color: #222;
  }

  h1 {
    font-size: 24px;
    margin: 0 0 14px 0;
  }

  .categories {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    margin-bottom: 16px;
    position: sticky;
    top: 0;
    background: #f5f5f5;
    padding-bottom: 6px;
    z-index: 10;
  }

  .category-btn {
    border: none;
    border-radius: 10px;
    padding: 10px 12px;
    cursor: pointer;
    background: white;
    box-shadow: 0 1px 4px rgba(0,0,0,0.12);
    font-size: 14px;
  }

  .category-btn.active {
    font-weight: bold;
    background: #e9eefc;
  }

  .products {
    display: grid;
    gap: 12px;
  }

  .card {
  background: white;
  border-radius: 12px;
  padding: 10px;
  box-shadow: 0 1px 6px rgba(0,0,0,0.12);
  display: flex;
  gap: 10px;
  align-items: flex-start;
}

.card img {
  width: 120px;
  height: 100px;
  object-fit: cover;
  border-radius: 8px;
  background: #eee;
  flex-shrink: 0;
}

.product-info {
  flex: 1;
}

.title {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 4px;
  line-height: 1.3;
}

.price {
  font-size: 15px;
  font-weight: bold;
  margin-bottom: 4px;
}

.status {
  font-size: 13px;
  margin-bottom: 4px;
}

.note,
.address {
  font-size: 12px;
  color: #444;
}

  .title {
    font-size: 18px;
    font-weight: bold;
    line-height: 1.3;
    margin-bottom: 8px;
  }

  .price {
    font-size: 18px;
    font-weight: bold;
    margin-bottom: 8px;
  }

  .status,
  .note,
  .address {
    font-size: 14px;
    line-height: 1.4;
    margin-bottom: 6px;
    color: #333;
    white-space: pre-line;
  }

  .actions {
    display: flex;
    gap: 8px;
    margin-top: 10px;
  }

  .actions a {
    flex: 1;
    text-decoration: none;
  }

  .btn {
    width: 100%;
    border: none;
    border-radius: 10px;
    padding: 11px 12px;
    cursor: pointer;
    font-size: 14px;
  }

  .btn-link {
    background: #e9eefc;
  }

  .btn-reserve {
    background: #dff5e1;
  }

  .btn-disabled {
    background: #eee;
    cursor: not-allowed;
  }

  @media (min-width: 700px) {
    body {
      max-width: 760px;
      margin: 0 auto;
      padding: 16px;
    }

    .card img {
      height: 220px;
    }
  }
</style>
</head>
<body>
  <h1>Каталог</h1>

  <div id="categories" class="categories"></div>
  <div id="products" class="products"></div>

  <script>
  const CSV_URL = "https://docs.google.com/spreadsheets/d/e/2PACX-1vRHotJMj91JKvS9RqK0zdfp8JVDj8KTm6HIrp5U1TeWOf3A7bXkfH6nCzxUWSgdwFSOkArHqmev8Z8B/pub?gid=978912227&single=true&output=csv";

  const tg = window.Telegram?.WebApp;
  if (tg) tg.expand();

  const categoriesEl = document.getElementById("categories");
  const productsEl = document.getElementById("products");

  const CATEGORIES = ["декор", "музыка", "канцелярия", "спорт", "медиа", "прочее"];

  let allProducts = [];
  let currentCategory = "декор";

  function parseCSVLine(line) {
    const result = [];
    let current = "";
    let inQuotes = false;

    for (let i = 0; i < line.length; i++) {
      const char = line[i];
      const next = line[i + 1];

      if (char === '"') {
        if (inQuotes && next === '"') {
          current += '"';
          i++;
        } else {
          inQuotes = !inQuotes;
        }
      } else if (char === "," && !inQuotes) {
        result.push(current);
        current = "";
      } else {
        current += char;
      }
    }

    result.push(current);
    return result;
  }

  function statusText(status) {
    const s = String(status || "").trim().toLowerCase();
    if (s === "free") return "🟢 В наличии";
    if (s === "reserved") return "🟡 Забронирован";
    if (s === "sold") return "🔴 Куплен";
    return "⚪ Неизвестно";
  }

  function buildCategories() {
    categoriesEl.innerHTML = "";

    CATEGORIES.forEach(category => {
      const btn = document.createElement("button");
      btn.className = "category-btn";
      if (category === currentCategory) btn.classList.add("active");

      btn.textContent = category;
      btn.onclick = () => {
        currentCategory = category;
        document.querySelectorAll(".category-btn").forEach(b => b.classList.remove("active"));
        btn.classList.add("active");
        renderProducts();
      };

      categoriesEl.appendChild(btn);
    });
  }

  function renderProducts() {
    productsEl.innerHTML = "";

    const filtered = allProducts.filter(product =>
      String(product.category || "").trim().toLowerCase() === currentCategory
    );

    filtered.forEach(product => {
      const card = document.createElement("div");
      card.className = "card";

      const imgSrc = product.image_link || product.image || "";
      const imgHtml = imgSrc ? `<img src="${imgSrc}" alt="${product.name || ""}">` : "";

      const productUrl = product.full_link || product.product_link || "#";

      card.innerHTML = `
        ${imgHtml}

        <div class="product-info">
          <div class="title">${product.name || ""}</div>

          <div class="price">
            ${product.price ? product.price + " ₽" : "Цена не указана"}
          </div>

          <div class="status">${statusText(product.status)}</div>

          <div class="note">
            ${product.note ? product.note : ""}
          </div>

          <div class="address">
            ${product.pickup_address ? "ПВЗ: " + product.pickup_address : ""}
          </div>

          <div class="actions">
            <a href="${productUrl}" target="_blank" style="flex:1;">
              <button class="btn btn-link">Открыть</button>
            </a>

            <div style="flex:1;">
              ${
                String(product.status || "").trim().toLowerCase() === "free"
                  ? `<button class="btn btn-reserve" onclick="reserveProduct(${product.id})">Бронь</button>`
                  : `<button class="btn btn-disabled" disabled>Нет</button>`
              }
            </div>
          </div>
        </div>
      `;

      productsEl.appendChild(card);
    });
  }

  async function loadProducts() {
    const res = await fetch(CSV_URL);
    const text = await res.text();

    const lines = text
      .replace(/\r/g, "")
      .split("\n")
      .filter(line => line.trim() !== "");

    const rows = lines.slice(1);

    allProducts = rows.map(row => {
      const cols = parseCSVLine(row);

      return {
        id: cols[0] || "",
        name: cols[1] || "",
        type: cols[2] || "",
        product_link: cols[3] || "",
        full_link: cols[4] || "",
        article: cols[5] || "",
        image: cols[6] || "",
        image_link: cols[7] || "",
        price: cols[8] || "",
        note: cols[9] || "",
        date: cols[10] || "",
        status: cols[11] || "",
        category: cols[12] || "",
        pickup_address: cols[13] || ""
      };
    });

    buildCategories();
    renderProducts();
  }

  const MAKE_WEBHOOK_URL = "https://hook.eu1.make.com/e576o9ilit16hwlobx6i5nfjpu9oskl7";

async function reserveProduct(productId) {
  try {
    const tgUser = window.Telegram?.WebApp?.initDataUnsafe?.user;

    const payload = {
      product_id: productId,
      user_id: tgUser?.id ? String(tgUser.id) : "test_user_1",
      username: tgUser?.username ? tgUser.username : "test_username"
    };

    const res = await fetch(MAKE_WEBHOOK_URL, {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify(payload)
    });

    if (!res.ok) {
      alert("Не удалось отправить бронь");
      return;
    }

    alert("Бронь отправлена");
  } catch (error) {
    console.error(error);
    alert("Ошибка при отправке брони");
  }
}

  loadProducts();
</script>
</body>
</html>
loadProducts();
